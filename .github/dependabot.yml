version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    versioning-strategy: increase
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    labels:
      - "dependencies"
      - "automerge"
    groups:
      # Zero runtime deps → every update is a devDep. Batch all non-major
      # bumps into a single weekly PR that auto-merges on green CI.
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      # Major bumps stay ungrouped → one PR each for human review (e.g. vite 5→7).

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github_actions"
      - "automerge"
    groups:
      # One PR for all non-major action bumps; majors reviewed individually.
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
